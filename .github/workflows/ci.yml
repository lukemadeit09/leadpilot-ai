name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests and security
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: sqlite://
      OPENAI_API_KEY: ""
      JWT_SECRET_KEY: ci-test-secret-key
      CELERY_TASK_ALWAYS_EAGER: "true"
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Compile backend
        run: python -m compileall backend/app

      - name: Run backend tests
        run: pytest backend

      - name: Run Bandit security scan
        run: bandit -r backend/app

  frontend:
    name: Frontend build and audit
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev
