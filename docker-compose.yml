services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: leadpilot
      POSTGRES_USER: leadpilot
      POSTGRES_PASSWORD: leadpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadpilot -d leadpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://leadpilot:leadpilot@postgres:5432/leadpilot
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=INFO --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://leadpilot:leadpilot@postgres:5432/leadpilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
